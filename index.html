<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shorts Player</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#ff0000" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background-color: #0f0f0f;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 0;    /*  Change #1 , was 16px  */
      border: 1px solid orange;    /*  Change #3 , Property was not there, Added  */
    }

    header {
      width: 100%;
      max-width: 420px;
      text-align: center;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #ff3333;
    }

    .input-box {
      width: 100%;
      max-width: 340px;    /*  Change #2 , was 420px  */
      display: flex;
      gap: 8px;
      margin-bottom: 36px;    /*  Change #4 , was 16px  */
    }

    input[type="text"] {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1f1f1f;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #ff3333;
    }

    button {
      padding: 12px 16px;
      border-radius: 8px;
      border: none;
      background: #ff3333;
      color: white;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:active {
      background: #cc0000;
    }

    /* 9:16 Aspect Ratio Container for Vertical Shorts */
    .player-wrapper {
      width: 100%;
      max-width: 360px;
      aspect-ratio: 9 / 16;
      background: #181818;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    #player {
      width: 100%;
      height: 100%;
      border: none;
    }

    .placeholder-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #888;
      font-size: 0.9rem;
      text-align: center;
      padding: 16px;
    }

    /* Speed Control Bar */
    .controls-card {
      width: 100%;
      max-width: 360px;
      margin-top: 22px;     /*  Change #6 , Original was 16px, then made 47px & on Adding button#Scroll_To_Center - the Current Value  -- done on 23Jul26 */
      background: #1f1f1f;
      padding: 12px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .controls-label {
      font-size: 0.8rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .speed-buttons {
      display: flex;
      flex-wrap: wrap; /* Added for 2 rows */
      gap: 6px;
      justify-content: space-between;
    }

    .speed-btn {
      flex: 1 1 calc(18%); /* Adjusts to fit 5 items per row nicely */
      padding: 8px 0;
      background: #2b2b2b;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      color: #eee;
      font-size: 0.85rem;
      min-width: 45px;
    }

    .speed-btn.active {
      background: #ff3333;
      border-color: #ff3333;
      color: rgb(255, 255, 200);     /*  Change #5 , was #fff  -- done on 23Jul26  */
    }

    /* New Default Speed UI */
    .default-speed-box {
      display: flex;
      gap: 8px;
    }

    .default-speed-box input[type="text"] {
      flex: 0.4;
      text-align: center;
      /*  The below 3 Css Lines, Added by Sac , on 23Jul26  */
      max-width: 150px;
      font-weight: bold;
      color: rgb(255, 255, 100);
    }

    .default-speed-box button {
      flex: 0.6;
    }

    div#Scroll_To_Center_container {
      width: 100%;   /* 500px */
      max-width: 360px; /* Matches the player and controls-card */
      display: flex;
      justify-content: flex-end;
    }

    button#Scroll_To_Center {
      /* width: 100px;      Let Padding handle the width, as suggested by Gemini Chat  */
      color: rgb(80 80 80);
      background: rgb(30 30 30);
      padding: 5px 30px;
      margin-top: 20px;
      border-radius: 4px;
      font: 16px Calibri;
      transition: none;
    }
  </style>
</head>
<body>

  <header>
    <h1>Shorts Web Player</h1>
  </header>

  <div class="input-box">
    <input type="text" id="urlInput" placeholder="Paste YouTube Short URL..." />
    <!--   <button onclick="pasteClipboard()">Paste</button>  -->
    <button onclick="loadFromInput()">Play</button>
  </div>

  <div class="player-wrapper">
    <div id="placeholder" class="placeholder-text">Paste a Short URL above to start playing</div>
    <div id="player"></div>
  </div>

  <div id="Scroll_To_Center_container">
      <button id="Scroll_To_Center" onclick="Scroll_To_Center()">Scroll</button>
  </div>

  <div class="controls-card">
    <!--  <span class="controls-label">Speed Controls</span>  -->
    <div class="speed-buttons">
      <!-- Added data-rate attributes for robust JS handling -->
      <button class="speed-btn" data-rate="0.25" onclick="setSpeed(0.25)">0.25</button>
      <button class="speed-btn" data-rate="0.35" onclick="setSpeed(0.35)">0.35</button>
      <button class="speed-btn" data-rate="0.45" onclick="setSpeed(0.45)">0.45</button>
      <button class="speed-btn" data-rate="0.55" onclick="setSpeed(0.55)">0.55</button>
      <button class="speed-btn" data-rate="0.65" onclick="setSpeed(0.65)">0.65</button>
      <button class="speed-btn" data-rate="0.75" onclick="setSpeed(0.75)">0.75</button>
      <button class="speed-btn" data-rate="0.85" onclick="setSpeed(0.85)">0.85</button>
      <button class="speed-btn" data-rate="0.9" onclick="setSpeed(0.9)">0.9</button>
      <button class="speed-btn" data-rate="0.95" onclick="setSpeed(0.95)">0.95</button>
      <button class="speed-btn" data-rate="1" onclick="setSpeed(1)">1</button>
    </div>

    <!-- Default Speed Feature -->
    <div class="default-speed-box">
      <input type="text" id="Speed_to_set" value="" readonly placeholder="Rate" />
      <button id="set_Default_Speed" onclick="saveDefaultSpeed()">Set Speed</button>
    </div>
  </div>

  <!-- YouTube IFrame API -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    let player;
    let isApiReady = false;

    // LocalStorage initialization logic
    function getDefaultSpeed() {
      const stored = localStorage.getItem('defaultSpeed');
      return stored ? parseFloat(stored) : 0.25;
    }

    function saveDefaultSpeed() {
      const speedVal = document.getElementById('Speed_to_set').value;
      if (speedVal) {
        localStorage.setItem('defaultSpeed', speedVal);
        alert('Default speed successfully set to: ' + speedVal);
      }
    }

    // Set UI on page load
    window.addEventListener('DOMContentLoaded', () => {
      const initSpeed = getDefaultSpeed();
      document.getElementById('Speed_to_set').value = initSpeed;
      updateActiveButton(initSpeed);
    });

    function onYouTubeIframeAPIReady() {
      isApiReady = true;
    }

    // Extract 11-character Video ID from various YouTube URL formats
    function extractVideoId(url) {
      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|shorts\/|watch\?v=|\&v=)([^#\&\?]*).*/;
      const match = url.match(regExp);
      return (match && match[2].length === 11) ? match[2] : null;
    }

    // Quick Paste from Mobile Clipboard
    async function pasteClipboard() {
      try {
        const text = await navigator.clipboard.readText();
        document.getElementById('urlInput').value = text;
        loadFromInput();
      } catch (err) {
        alert('Clipboard access denied. Please paste manually.');
      }
    }

    function loadFromInput() {
      const url = document.getElementById('urlInput').value.trim();
      const videoId = extractVideoId(url);

      if (!videoId) {
        alert('Invalid YouTube URL');
        return;
      }

      document.getElementById('placeholder').style.display = 'none';

	// ---> ADD THE SCROLL CODE HERE <---
      window.scrollBy({
	top: 90, // Adjust this pixel value as needed
	left: 0,
	behavior: 'smooth'
      });
	// -----------------------------------

      if (!player) {
        player = new YT.Player('player', {
          videoId: videoId,
          playerVars: {
            'autoplay': 1,
            'rel': 0,
            'modestbranding': 1,
            'playsinline': 1
          },
          events: {
            'onReady': (event) => {
              event.target.playVideo();
            },
            // Ensuring speed applies correctly immediately after video starts
            'onStateChange': (event) => {
              if (event.data === YT.PlayerState.PLAYING) {
                const currentRate = parseFloat(document.getElementById('Speed_to_set').value) || getDefaultSpeed();
                event.target.setPlaybackRate(currentRate);
              }
            }
          }
        });
      } else {
        player.loadVideoById(videoId);
      }
    }

    // Speed Control Logic (Triggered by user click)
    function setSpeed(rate) {
      document.getElementById('Speed_to_set').value = rate;

      if (player && typeof player.setPlaybackRate === 'function') {
        player.setPlaybackRate(rate);
      }

      updateActiveButton(rate);
    }

    // Updates the visual active class cleanly
    function updateActiveButton(rate) {
      document.querySelectorAll('.speed-btn').forEach(btn => {
        btn.classList.remove('active');
        if (parseFloat(btn.getAttribute('data-rate')) === rate) {
          btn.classList.add('active');
        }
      });
    }


    function Scroll_To_Center() {
        window.scrollBy({
        top: 90, // Adjust this pixel value as needed
        left: 0,
        behavior: 'smooth'
      });
    }
  </script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then((reg) => console.log('Service Worker registered!', reg))
        .catch((err) => console.error('Service Worker registration failed:', err));
    });
  }
</script>

</body>
</html>
